            <button id="previewSave" style="display: none">💾 Speichern</button>
          </div>
        </div>
        <div class="nr4_camerascreen" style="display: none">
          <div class="camera-ui">
            <div class="camera-header">
              <span>📷 Foto für Bewerbung aufnehmen</span>
              <button id="camera-close-btn">✖️</button>
            </div>
            <div class="camera-body">
              <video id="video" autoplay playsinline></video>
              <canvas id="canvas" style="display: none"></canvas>
              <img id="photo" style="display: none" alt="Aufgenommenes Foto" />
            </div>
            <div class="camera-footer">
              <button id="capture-btn">📸 Foto aufnehmen</button>
              <button id="retake-btn" style="display: none">🔄 Nochmal</button>
              <button id="save-photo-btn" style="display: none">
                💾 Foto speichern
              </button>
            </div>
          </div>
        </div>
        <!-- CAPTCHA Modal -->
        <div class="nr5_captcha" id="captchaScreen" style="display: none">
          <div class="captcha-ui">
            <div class="captcha-header">
              <span class="captcha-logo">🤖 Ich bin kein Roboter</span>
            </div>
            <div class="captcha-instruction" id="captchaInstruction"></div>
            <div class="captcha-grid" id="captchaGrid"></div>
            <div class="captcha-error" id="captchaError"></div>
            <div class="captcha-footer">
              <button class="captcha-confirm-btn" id="captchaConfirm">
                Bestätigen
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- Drag and Drop over -->
      <img
        class="postit"
        src="images/postit.png"
        alt=""
        style="display: none"
      />
      <img
        class="cattail"
        src="images/cattail.gif"
        alt=""
        style="display: none"
      />
    </div>

    <button class="applyButton" style="display: none">
      <p>Bewerbung abschicken</p>
    </button>
    <script src="script.js"></script>
  </body>
</html>
