<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dokumente rüberziehen</title>
    <style>
      :root {
        font-family: system-ui, Arial, sans-serif;
      }
      body {
        margin: 0;
        background: url(https://hypership.uk/uploads/20260218103113_00_WhatsApp_Image_2026-02-18_at_11.29.18.jpeg);
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;

        color: #e2e8f0;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .clock {
        position: absolute;
        top: 20px;
        font-size: 18px;
        background: rgba(17, 24, 39, 0.8);
        padding: 6px 12px;
        border-radius: 10px;
        border: 1px solid #334155;
      }
      .pc {
        width: 820px;
        max-width: 94vw;
        height: 460px;
        background: #111827;
        border: 2px solid #334155;
        border-radius: 14px;
        padding: 16px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .title {
        font-weight: 700;
      }
      .pill {
        border: 1px solid #334155;
        background: #0b1220;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 14px;
      }

      .screen {
        background: #0b1220;
        border: 2px solid #1f2937;
        border-radius: 12px;
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        min-height: 320px;
      }

      .zone {
        background: rgba(148, 163, 184, 0.08);
        border: 2px dashed rgba(148, 163, 184, 0.35);
        border-radius: 12px;
        padding: 12px;
      }
      .zone h3 {
        margin: 0 0 10px;
        font-size: 14px;
        color: #cbd5e1;
      }
      .docs {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        min-height: 60px;
      } /* wichtig: Drop-Fläche */
      .hint {
        font-size: 13px;
        opacity: 0.85;
        margin-top: 10px;
      }

      .doc {
        width: 150px;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 10px;
        padding: 10px 10px 12px;
        cursor: grab;
        user-select: none;
        border: 1px solid rgba(15, 23, 42, 0.12);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      }
      .doc:active {
        cursor: grabbing;
      }
      .icon {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        background: #e2e8f0;
        display: grid;
        place-items: center;
        margin-bottom: 8px;
        font-weight: 800;
      }

      .win {
        margin-top: 12px;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.35);
        padding: 10px 12px;
        border-radius: 12px;
        display: none;
      }
      .zoneB.ready {
        border-color: rgba(34, 197, 94, 0.7);
        background: rgba(34, 197, 94, 0.08);
      }

      .btnrow {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
      }
      button:hover {
        background: #0e1730;
      }
    </style>
  </head>
  <body>
    <div class="game">
      <div class="clock">⏱️ <span id="time">0.0</span>s</div>
      <div class="pc">
        <div class="nr1_login">
          <input type="text" id="username" placeholder="Benutzername" />
          <input type="password" id="password" placeholder="Passwort" />
          <button id="loginBtn">Login</button>
        </div>
        <!-- Drag and Drop -->
        <div class="nr2_dragdrop" id="nr2_dragdrop" style="display: none">
          <div class="screen">
            <div class="zone zoneA" id="zoneA">
              <h3>Zone A (Start)</h3>
              <div class="docs" id="docsA"></div>
              <div class="hint">Zieh alle Dateien nach rechts.</div>
            </div>

            <div class="zone zoneB" id="zoneB">
              <h3>Zone B (Ziel)</h3>
              <div class="docs" id="docsB"></div>
              <div class="hint">Wenn alle hier sind, gewinnst du.</div>
            </div>
          </div>

          <div class="btnrow">
            <button id="resetBtn">Reset</button>
            <button id="shuffleBtn">Neue Dokumente</button>
          </div>
        </div>
        <!-- Drag and Drop over -->

        <div class="finished" style="display: none">
          <p>Done?</p>
          <button id="finishButton">Finish</button>
        </div>

        <div class="win" id="winBox" style="display: none">
          ✅ Gewonnen! Zeit: <b id="finalTime"></b>s
        </div>
      </div>
    </div>
    <!-- Login script -->
    <script>
      // Timer
      let t0 = 0,
        rafId = null;
      const now = () => performance.now();

      function tick() {
        const elapsed = (now() - t0) / 1000;
        timeEl.textContent = elapsed.toFixed(1);
        rafId = requestAnimationFrame(tick);
      }
      function startTimer() {
        if (t0) return;
        t0 = now();
        tick();
      }
      function stopTimer() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = null;
      }
      function resetTimer() {
        stopTimer();
        t0 = 0;
        timeEl.textContent = "0.0";
      }

      const loginBtn = document.getElementById("loginBtn");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const loginBox = document.querySelector(".nr1_login");
      const gameBox = document.querySelector(".nr2_dragdrop");

      loginBtn.addEventListener("click", () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        // Einfache Validierung (nur Demo-Zwecke)
        if (username != 0 && password != 0) {
          loginBox.style.display = "none";
          gameBox.style.display = "block";
          startTimer();
        } else {
          alert("Ungültige Anmeldedaten.");
        }
      });
    </script>
    <!-- Login script -->
    <!-- Drag and Drop script -->
    <script>
      const zoneA = document.getElementById("zoneA");
      const zoneB = document.getElementById("zoneB");
      const docsA = document.getElementById("docsA");
      const docsB = document.getElementById("docsB");

      const timeEl = document.getElementById("time");
      const countBEl = document.getElementById("countB");
      const totalEl = document.getElementById("total");
      const nr2_dragdropEL = document.getElementById(".nr2_dragdrop");
      const winBox = document.getElementById("winBox");
      const finalTimeEl = document.getElementById("finalTime");

      const resetBtn = document.getElementById("resetBtn");
      const shuffleBtn = document.getElementById("shuffleBtn");

      let totalDocs = 0;
      let won = false;

      function makeDoc({ ext, name }) {
        const el = document.createElement("div");
        el.className = "doc";
        el.draggable = true;
        el.id = "doc-" + Math.random().toString(16).slice(2);

        el.innerHTML = `
        <div class="icon">${ext}</div>
        <div><b>${name}</b><div style="font-size:12px;opacity:.75;">Drag & Drop</div></div>
      `;

        el.addEventListener("dragstart", (e) => {
          e.dataTransfer.setData("text/plain", el.id);
          e.dataTransfer.effectAllowed = "move";
        });

        return el;
      }

      function setWon(state) {
        won = state;
        winBox.style.display = won ? "block" : "none";
        zoneB.classList.toggle("ready", won);

        if (won) {
          stopTimer();
          finalTimeEl.textContent = timeEl.textContent;
        } else {
        }
      }

      function updateCounters() {
        const inB = docsB.querySelectorAll(".doc").length;
        countBEl.textContent = String(inB);
        totalEl.textContent = String(totalDocs);

        setWon(inB === totalDocs && totalDocs > 0);
      }

      // Wichtig: dragover + drop direkt auf die ZONEN, nicht nur auf den inneren Container.
      function wireZoneDrop(zoneEl, targetDocsContainer) {
        zoneEl.addEventListener("dragover", (e) => {
          e.preventDefault(); // erlaubt drop
          e.dataTransfer.dropEffect = "move";
        });

        zoneEl.addEventListener("drop", (e) => {
          e.preventDefault();
          const id = e.dataTransfer.getData("text/plain");
          const el = document.getElementById(id);
          if (!el) return;
          targetDocsContainer.appendChild(el);
          updateCounters();
        });
      }

      wireZoneDrop(zoneA, docsA);
      wireZoneDrop(zoneB, docsB);

      function loadGame(docs) {
        docsA.innerHTML = "";
        docsB.innerHTML = "";
        winBox.style.display = "none";
        resetTimer();

        docs.forEach((d) => docsA.appendChild(makeDoc(d)));
        totalDocs = docs.length;

        updateCounters();
      }

      function randomDocs() {
        const pool = [
          { ext: "PDF", name: "report.pdf" },
          { ext: "DOC", name: "vertrag.doc" },
          { ext: "XLS", name: "budget.xls" },
          { ext: "PNG", name: "mockup.png" },
          { ext: "TXT", name: "notizen.txt" },
          { ext: "PPT", name: "pitch.ppt" },
        ];
        const n = 3 + Math.floor(Math.random() * 3); // 3–5
        return pool.sort(() => Math.random() - 0.5).slice(0, n);
      }

      resetBtn.addEventListener("click", () => {
        docsB.querySelectorAll(".doc").forEach((el) => docsA.appendChild(el));
        resetTimer();
        updateCounters();
      });

      shuffleBtn.addEventListener("click", () => loadGame(randomDocs()));

      loadGame([
        { ext: "PDF", name: "report.pdf" },
        { ext: "DOC", name: "briefing.doc" },
        { ext: "XLS", name: "zahlen.xls" },
        { ext: "PNG", name: "screenshot.png" },
      ]);
    </script>

    <script>
      const finishButton = document.getElementById("finishButton");
      const finishedBox = document.querySelector(".finished");

      finishButton.addEventListener("click", () => {
        finishedBox.style.display = "none";
        winBox.style.display = "block";
      });
    </script>
  </body>
</html>
