<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>5 vor 12</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="game">
      <div class="clock">⏱️ <span id="time">0.0</span>s</div>
      <div class="error-message" id="errorMessage">Falsches Passwort!</div>
        <div class="nr1_login">
          <input type="text" id="username" value="AFK_Warrior" readonly />
          <input type="password" id="password" placeholder="Passwort" />
          <button id="loginBtn">Login</button>
        </div>
        <!-- Drag and Drop -->
        <div class="nr2_dragdrop" id="nr2_dragdrop" style="display: none">
          <div class="screen">
            <div class="zone zoneA" id="zoneA">
              <h3>📁 Datei-Explorer</h3>
              <div class="docs" id="docsA"></div>
            </div>

            <div class="zone zoneB" id="zoneB">
              <div id="zoneBdropable">
              <div class="docs" id="docsB"></div>
              </div>
            </div>
          </div>

          </div>
        </div>
        <!-- Drag and Drop over -->
         <img class="postit" src="images/postit.png" alt="">
         <img class="cattail" src="images/cattail.gif" alt="">
            

        <div class="finished" style="display: none">
          <p>Done?</p>
          <button id="finishButton">Finish</button>
        </div>

        <div class="win" id="winBox" style="display: none">
          ✅ Gewonnen! Zeit: <b id="finalTime"></b>s
        </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
